<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日語入門 · 互動課程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#1f1633">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

<header class="app-header">
  <button class="back-btn" id="backBtn" onclick="App.goBack()">←</button>
  <h1><span>日</span>語教室</h1>
</header>

<main class="app-main" id="appMain">

  <div class="view active" id="viewHome">
    <div class="home-hero">
      <p class="greeting">日本語 入門コース</p>
      <h2>ようこそ！<br>日語<span class="hl">入門</span>教室</h2>
      <p>從零開始 · 8 週學會日常會話</p>
    </div>
    <div class="progress-ring-wrap">
      <div class="progress-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="50"/>
          <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="50" stroke-dasharray="314.16" stroke-dashoffset="314.16"/>
        </svg>
        <div class="ring-label">
          <span class="pct" id="ringPct">0%</span>
          <span class="sub">完成度</span>
        </div>
      </div>
    </div>
    <div class="home-stats">
      <div class="stat-card"><div class="num" id="statLessons">0</div><div class="lbl">已上課</div></div>
      <div class="stat-card"><div class="num" id="statQuizzes">0</div><div class="lbl">測驗數</div></div>
      <div class="stat-card"><div class="num" id="statAvg">-</div><div class="lbl">平均分</div></div>
    </div>
  </div>

  <div class="view" id="viewLessons">
    <div id="lessonList"></div>
    <div id="lessonDetail" class="lesson-detail"></div>
  </div>

  <div class="view" id="viewQuiz">
    <div id="quizContent"></div>
  </div>

  <div class="view" id="viewProgress">
    <div id="progressContent"></div>
  </div>

  <div class="view" id="viewKana">
    <div id="kanaChartContent"></div>
  </div>

</main>

<nav class="app-tabs">
  <button class="tab-btn active" data-tab="home" onclick="App.switchTab('home')">
    <span class="tab-icon">🏠</span> 首頁
  </button>
  <button class="tab-btn" data-tab="lessons" onclick="App.switchTab('lessons')">
    <span class="tab-icon">📖</span> 課程
  </button>
  <button class="tab-btn" data-tab="quiz" onclick="App.switchTab('quiz')">
    <span class="tab-icon">✍️</span> 測驗
  </button>
  <button class="tab-btn" data-tab="kana" onclick="App.switchTab('kana')">
    <span class="tab-icon">🔤</span> 五十音
  </button>
  <button class="tab-btn" data-tab="progress" onclick="App.switchTab('progress')">
    <span class="tab-icon">📊</span> 進度
  </button>
</nav>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
<audio id="audioPlayer" preload="auto" style="display:none"></audio>
</body>
</html>
