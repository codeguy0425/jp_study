<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日語入門 · 互動課程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #150f23;
  --ink-deep: #1f1633;
  --accent-lime: #c2ef4e;
  --accent-pink: #fa7faa;
  --accent-violet-mid: #79628c;
  --accent-violet-deep: #422082;
  --surface-canvas-dark: #1f1633;
  --surface-night: #150f23;
  --on-primary: #ffffff;
  --on-dark-muted: rgba(255,255,255,0.72);
  --on-dark-faint: rgba(255,255,255,0.18);
  --hairline-violet: #362d59;
  --font-ui: 'Rubik', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;
  --tab-height: 64px;
  --header-height: 52px;
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 24px;
  --spacing-xxl: 32px;
  --rounded-xs: 4px;
  --rounded-sm: 6px;
  --rounded-md: 8px;
  --rounded-lg: 10px;
  --rounded-xl: 12px;
  --rounded-xxl: 18px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

body {
  font-family: var(--font-ui);
  background: var(--surface-canvas-dark);
  color: var(--on-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ─── header ─── */
.app-header {
  height: var(--header-height);
  display: flex;
  align-items: center;
  padding: 0 var(--spacing-lg);
  background: var(--surface-canvas-dark);
  border-bottom: 1px solid var(--hairline-violet);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.app-header .back-btn {
  background: none;
  border: none;
  color: var(--on-primary);
  font-size: 20px;
  cursor: pointer;
  padding: var(--spacing-sm);
  margin-right: var(--spacing-sm);
  display: none;
  line-height: 1;
}
.app-header .back-btn.visible { display: block; }
.app-header h1 {
  font-size: 18px;
  font-weight: 600;
  flex: 1;
}
.app-header h1 span { color: var(--accent-lime); }

/* ─── main content ─── */
.app-main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--spacing-lg);
}
.app-main::-webkit-scrollbar { width: 4px; }
.app-main::-webkit-scrollbar-track { background: transparent; }
.app-main::-webkit-scrollbar-thumb { background: var(--hairline-violet); border-radius: 4px; }

/* ─── bottom tabs ─── */
.app-tabs {
  height: var(--tab-height);
  display: flex;
  background: var(--surface-night);
  border-top: 1px solid var(--hairline-violet);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--on-dark-muted);
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2px;
  text-transform: uppercase;
  cursor: pointer;
  padding: 6px 0;
  min-height: 48px;
  transition: color .2s;
  position: relative;
}
.tab-btn .tab-icon { font-size: 20px; line-height: 1; }
.tab-btn.active { color: var(--accent-lime); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: 25%;
  right: 25%;
  height: 2px;
  background: var(--accent-lime);
  border-radius: 0 0 2px 2px;
}

/* ─── views ─── */
.view { display: none; padding: var(--spacing-lg); animation: fadeUp .25s ease; }
.view.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── home view ─── */
.home-hero {
  text-align: center;
  padding: var(--spacing-xxl) 0;
}
.home-hero .greeting { font-size: 13px; color: var(--on-dark-muted); text-transform: uppercase; letter-spacing: 0.2px; margin-bottom: var(--spacing-sm); }
.home-hero h2 { font-size: 26px; font-weight: 600; margin-bottom: var(--spacing-xs); }
.home-hero h2 .hl { color: var(--accent-lime); }
.home-hero p { color: var(--on-dark-muted); font-size: 14px; line-height: 1.7; }
.progress-ring-wrap {
  display: flex;
  justify-content: center;
  margin: var(--spacing-xl) 0;
}
.progress-ring {
  position: relative;
  width: 120px;
  height: 120px;
}
.progress-ring svg { transform: rotate(-90deg); }
.progress-ring .ring-bg { fill: none; stroke: var(--hairline-violet); stroke-width: 6; }
.progress-ring .ring-fg { fill: none; stroke: var(--accent-lime); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
.progress-ring .ring-label {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.progress-ring .ring-label .pct { font-size: 28px; font-weight: 700; color: var(--accent-lime); }
.progress-ring .ring-label .sub { font-size: 11px; color: var(--on-dark-muted); }
.home-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--spacing-md);
  margin-top: var(--spacing-lg);
}
.stat-card {
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-lg);
  padding: var(--spacing-lg);
  text-align: center;
}
.stat-card .num { font-size: 22px; font-weight: 700; color: var(--accent-lime); }
.stat-card .lbl { font-size: 11px; color: var(--on-dark-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.2px; }

/* ─── lesson list ─── */
.lesson-list { display: flex; flex-direction: column; gap: var(--spacing-md); padding-top: var(--spacing-sm); }
.lesson-card {
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-xl);
  padding: var(--spacing-lg);
  cursor: pointer;
  transition: background .2s, border-color .2s;
  display: flex;
  align-items: center;
  gap: var(--spacing-lg);
}
.lesson-card:active { background: var(--ink-deep); }
.lesson-card.completed { border-color: var(--accent-lime); }
.lesson-card .badge {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: var(--rounded-md);
  background: var(--accent-violet-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent-lime);
}
.lesson-card.completed .badge { background: var(--accent-lime); color: var(--primary); }
.lesson-card .info { flex: 1; min-width: 0; }
.lesson-card .info h3 { font-size: 15px; font-weight: 600; }
.lesson-card .info p { font-size: 12px; color: var(--on-dark-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lesson-card .status-icon { font-size: 16px; color: var(--accent-lime); flex-shrink: 0; }

/* ─── lesson detail ─── */
.lesson-detail { display: none; }
.lesson-detail.active { display: block; }
.lesson-detail .section-title {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.2px;
  color: var(--accent-lime);
  margin: var(--spacing-xl) 0 var(--spacing-md);
}
.lesson-detail .section-title:first-child { margin-top: 0; }
.lesson-detail .intro-text {
  color: var(--on-dark-muted);
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: var(--spacing-lg);
}

/* ─── kana table ─── */
.kana-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--spacing-sm);
}
.kana-cell {
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-md);
  padding: var(--spacing-sm);
  text-align: center;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.kana-cell:active { background: var(--accent-violet-deep); border-color: var(--accent-lime); }
.kana-cell .char { font-size: 22px; font-weight: 600; display: block; line-height: 1.3; }
.kana-cell .rom { font-size: 10px; color: var(--on-dark-muted); display: block; text-transform: lowercase; }

/* ─── vocab list ─── */
.vocab-list { display: flex; flex-direction: column; gap: var(--spacing-sm); }
.vocab-item {
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-md);
  padding: var(--spacing-md) var(--spacing-lg);
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
  cursor: pointer;
  transition: background .15s;
}
.vocab-item:active { background: var(--ink-deep); }
.vocab-item .jp { font-size: 18px; font-weight: 500; flex-shrink: 0; min-width: 80px; }
.vocab-item .romaji { font-size: 12px; color: var(--on-dark-muted); flex-shrink: 0; min-width: 70px; }
.vocab-item .zh { font-size: 14px; color: var(--on-dark-muted); flex: 1; text-align: right; }
.vocab-item .sound-btn {
  flex-shrink: 0;
  background: var(--accent-violet-deep);
  border: none;
  color: var(--on-primary);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.vocab-item .sound-btn:active { background: var(--accent-lime); color: var(--primary); }

/* ─── grammar ─── */
.grammar-item {
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-md);
  padding: var(--spacing-lg);
  margin-bottom: var(--spacing-md);
}
.grammar-item:last-child { margin-bottom: 0; }
.grammar-item .pattern {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent-lime);
  margin-bottom: var(--spacing-xs);
}
.grammar-item .explain {
  font-size: 13px;
  color: var(--on-dark-muted);
  line-height: 1.7;
  margin-bottom: var(--spacing-sm);
}
.grammar-voice {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-sm);
  margin-top: var(--spacing-sm);
}
.voice-btn {
  background: var(--ink-deep);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-xl);
  padding: var(--spacing-xs) var(--spacing-md);
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--on-primary);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  display: inline-flex;
  align-items: center;
  gap: var(--spacing-xs);
}
.voice-btn:active { background: var(--accent-violet-deep); border-color: var(--accent-lime); }
.grammar-item .example {
  font-size: 15px;
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--ink-deep);
  border-radius: var(--rounded-sm);
  display: inline-block;
}
.grammar-item .example .eg-zh { font-size: 12px; color: var(--on-dark-muted); display: block; margin-top: 2px; }

/* ─── quiz ─── */
.quiz-view { padding: var(--spacing-lg); }
.quiz-header {
  margin-bottom: var(--spacing-xl);
}
.quiz-header h2 { font-size: 20px; font-weight: 600; margin-bottom: var(--spacing-xs); }
.quiz-header .quiz-meta { color: var(--on-dark-muted); font-size: 13px; }
.quiz-question {
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-xl);
  padding: var(--spacing-xl);
  margin-bottom: var(--spacing-lg);
}
.quiz-question .q-num {
  font-size: 12px;
  color: var(--accent-lime);
  text-transform: uppercase;
  letter-spacing: 0.2px;
  margin-bottom: var(--spacing-sm);
}
.quiz-question .q-text {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: var(--spacing-lg);
  line-height: 1.6;
}
.quiz-question .q-text .q-jp { font-size: 22px; display: block; margin-top: var(--spacing-xs); }
.quiz-options { display: flex; flex-direction: column; gap: var(--spacing-sm); }
.quiz-option {
  background: var(--ink-deep);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-md);
  padding: var(--spacing-md) var(--spacing-lg);
  font-size: 15px;
  font-family: var(--font-ui);
  color: var(--on-primary);
  cursor: pointer;
  text-align: left;
  transition: background .15s, border-color .15s;
}
.quiz-option:active { background: var(--accent-violet-deep); }
.quiz-option.selected { border-color: var(--accent-lime); background: rgba(194,239,78,0.1); }
.quiz-option.correct { border-color: var(--accent-lime); background: rgba(194,239,78,0.15); }
.quiz-option.wrong { border-color: var(--accent-pink); background: rgba(250,127,170,0.1); }
.quiz-option:disabled { cursor: default; opacity: 0.7; }
.quiz-option.correct:disabled { opacity: 1; }
.quiz-option .opt-label {
  font-size: 11px;
  color: var(--on-dark-muted);
  text-transform: uppercase;
  letter-spacing: 0.2px;
  margin-right: var(--spacing-sm);
}
.quiz-submit {
  display: block;
  width: 100%;
  padding: var(--spacing-md);
  background: var(--accent-lime);
  color: var(--primary);
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2px;
  border: none;
  border-radius: var(--rounded-md);
  cursor: pointer;
  transition: opacity .2s;
  margin-top: var(--spacing-lg);
}
.quiz-submit:disabled { opacity: 0.4; cursor: default; }
.quiz-submit:active:not(:disabled) { opacity: 0.8; }
.quiz-result {
  text-align: center;
  padding: var(--spacing-xxl);
  background: var(--surface-night);
  border: 2px solid var(--accent-lime);
  border-radius: var(--rounded-xxl);
  margin-top: var(--spacing-lg);
}
.quiz-result .score { font-size: 48px; font-weight: 700; color: var(--accent-lime); }
.quiz-result .score-label { font-size: 14px; color: var(--on-dark-muted); }
.quiz-result .msg { margin-top: var(--spacing-md); font-size: 15px; }

/* ─── progress view ─── */
.progress-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--spacing-md);
  margin-bottom: var(--spacing-xl);
}
.progress-card {
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-lg);
  padding: var(--spacing-lg);
  text-align: center;
}
.progress-card .big { font-size: 28px; font-weight: 700; color: var(--accent-lime); }
.progress-card .lbl { font-size: 11px; color: var(--on-dark-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.2px; }
.progress-detail { display: flex; flex-direction: column; gap: var(--spacing-sm); }
.progress-row {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
  padding: var(--spacing-md);
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-md);
}
.progress-row .p-name { flex: 1; font-size: 14px; }
.progress-row .p-bar {
  flex: 1;
  height: 6px;
  background: var(--ink-deep);
  border-radius: 3px;
  overflow: hidden;
}
.progress-row .p-bar .fill {
  height: 100%;
  background: var(--accent-lime);
  border-radius: 3px;
  transition: width .4s ease;
}
.progress-row .p-score { font-size: 13px; font-weight: 600; color: var(--accent-lime); min-width: 36px; text-align: right; }
.progress-row .p-status { font-size: 14px; }

/* ─── empty state ─── */
.empty-state {
  text-align: center;
  padding: var(--spacing-xxl) 0;
  color: var(--on-dark-muted);
}
.empty-state .icon { font-size: 40px; margin-bottom: var(--spacing-lg); display: block; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ─── kana chart ─── */
.kana-chart-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: var(--spacing-lg); }
.kana-chart { width: 100%; min-width: 340px; border-collapse: separate; border-spacing: 3px; }
.kana-chart th {
  font-size: 11px;
  color: var(--on-dark-muted);
  text-transform: uppercase;
  letter-spacing: 0.2px;
  padding: var(--spacing-xs) var(--spacing-sm);
  text-align: center;
  font-weight: 500;
}
.kana-chart .row-label {
  font-size: 13px;
  color: var(--accent-lime);
  font-weight: 600;
  text-align: center;
  padding: var(--spacing-xs) var(--spacing-sm);
  white-space: nowrap;
  width: 48px;
}
.kana-chart .empty { background: transparent; }
.kana-cell-lg {
  background: var(--surface-night);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-md);
  padding: var(--spacing-sm);
  text-align: center;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  min-width: 64px;
}
.kana-cell-lg:active { background: var(--accent-violet-deep); border-color: var(--accent-lime); }
.kana-cell-lg .hira { font-size: 20px; font-weight: 600; display: block; line-height: 1.3; }
.kana-cell-lg .kata { font-size: 15px; color: var(--on-dark-muted); display: block; line-height: 1.2; }
.kana-cell-lg .rom { font-size: 10px; color: var(--on-dark-faint); display: block; line-height: 1.2; text-transform: lowercase; }
.kana-chart.compact .kana-cell-lg { min-width: 56px; }
.kana-chart.compact .kana-cell-lg .hira { font-size: 18px; }

/* ─── flashcard ─── */
.flashcard-filter-bar {
  display: flex;
  justify-content: center;
  gap: var(--spacing-sm);
  margin-bottom: var(--spacing-lg);
}
.fc-filter-btn {
  padding: var(--spacing-sm) var(--spacing-lg);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--rounded-xl);
  background: var(--surface-night);
  color: var(--on-dark-muted);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.fc-filter-btn.active {
  background: var(--accent-lime);
  color: var(--primary);
  border-color: var(--accent-lime);
  font-weight: 600;
}
.fc-filter-btn:active { opacity: 0.8; }
.flashcard-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--spacing-lg) 0;
  touch-action: none;
}
.flashcard-counter {
  font-size: 13px;
  color: var(--on-dark-muted);
  margin-bottom: var(--spacing-lg);
  letter-spacing: 0.2px;
}
.flashcard {
  width: 240px;
  height: 280px;
  perspective: 600px;
  cursor: pointer;
  margin-bottom: var(--spacing-lg);
}
.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform .5s ease;
  transform-style: preserve-3d;
}
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute;
  inset: 0;
  border-radius: var(--rounded-xxl);
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--spacing-xl);
}
.flashcard-front {
  background: var(--accent-violet-deep);
  border: 2px solid var(--hairline-violet);
}
.flashcard-back {
  background: var(--surface-night);
  border: 2px solid var(--accent-lime);
  transform: rotateY(180deg);
}
.flashcard-front .fc-char { font-size: 80px; font-weight: 700; line-height: 1; }
.flashcard-front .fc-label { font-size: 12px; color: var(--on-dark-muted); margin-top: var(--spacing-md); text-transform: uppercase; letter-spacing: 0.2px; }
.flashcard-back .fc-char { font-size: 64px; font-weight: 700; line-height: 1; }
.flashcard-back .fc-rom { font-size: 28px; font-weight: 500; color: var(--accent-lime); margin-top: var(--spacing-md); }
.flashcard-back .fc-label { font-size: 12px; color: var(--on-dark-muted); margin-top: var(--spacing-xs); }
.flashcard-hint { font-size: 13px; color: var(--on-dark-muted); margin-bottom: var(--spacing-lg); }
.flashcard-actions {
  display: flex;
  gap: var(--spacing-lg);
}
.flashcard-actions button {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 2px solid var(--hairline-violet);
  background: var(--surface-night);
  color: var(--on-primary);
  font-size: 28px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.flashcard-actions button:active { background: var(--ink-deep); }

const App = {
  state: {
    tab: 'home',
    viewingWeek: null,
    quizWeek: null,
    quizSubmitted: false,
    flashcardMode: false,
    flashcardFilter: 'all',
    flashcardDeck: [],
    flashcardIdx: 0,
    flashcardFlipped: false,
    flashcardKnown: JSON.parse(localStorage.getItem('jp_flash_known') || '[]'),
    done: JSON.parse(localStorage.getItem('jp_done') || '[]'),
    scores: JSON.parse(localStorage.getItem('jp_scores') || '{}')
  },

  init() {
    this.renderLessons();
    this.renderProgress();
    this.updateHomeStats();
    document.addEventListener('keydown', e => {
      if (!this.state.flashcardMode) return;
      if (e.key === 'ArrowRight') { this.nextCard(); e.preventDefault(); }
      if (e.key === 'ArrowLeft') { this.prevCard(); e.preventDefault(); }
      if (e.key === ' ' || e.key === 'Space') { this.flipFlashcard(); e.preventDefault(); }
    });
  },

  save() {
    localStorage.setItem('jp_done', JSON.stringify(this.state.done));
    localStorage.setItem('jp_scores', JSON.stringify(this.state.scores));
    localStorage.setItem('jp_flash_known', JSON.stringify(this.state.flashcardKnown));
    this.updateHomeStats();
    this.renderProgress();
    this.renderLessons();
  },

  switchTab(tab) {
    this.state.tab = tab;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    document.getElementById('backBtn').classList.remove('visible');
    if (tab === 'lessons') { this.renderLessons(); }
    if (tab === 'quiz') { this.renderQuiz(); }
    if (tab === 'kana') { this.renderKanaChart(); }
    if (tab === 'progress') { this.renderProgress(); }
    document.getElementById('appMain').scrollTop = 0;
  },

  goBack() {
    if (this.state.flashcardMode) {
      this.state.flashcardMode = false;
      this.state.flashcardFlipped = false;
      this.renderQuiz();
      document.getElementById('backBtn').classList.remove('visible');
      return;
    }
    if (this.state.viewingWeek !== null) {
      this.state.viewingWeek = null;
      this.renderLessons();
    } else if (this.state.quizWeek !== null) {
      this.state.quizWeek = null;
      this.state.quizSubmitted = false;
      this.renderQuiz();
    }
  },

  openLesson(id) {
    this.state.viewingWeek = id;
    const backBtn = document.getElementById('backBtn');
    backBtn.classList.add('visible');
    this.renderLessonDetail(id);
    document.getElementById('appMain').scrollTop = 0;
  },

  /* ─── kana chart ─── */
  renderKanaChart() {
    const container = document.getElementById('kanaChartContent');
    const cols = ['a', 'i', 'u', 'e', 'o'];
    const colLabels = ['あ段', 'い段', 'う段', 'え段', 'お段'];

      let h = `<div class="section-title" style="margin-top:var(--spacing-xl);">${title}</div>
        <div class="kana-chart-scroll"><table class="kana-chart">
        <thead><tr><th></th>${colLabels.map(l => `<th>${l}</th>`).join('')}</tr></thead><tbody>`;
      data.forEach(row => {
        h += `<tr><td class="row-label">${row.label}</td>`;
        cols.forEach(c => {
          const k = row[c];
          if (!k) { h += `<td class="empty"></td>`; return; }
          h += `<td class="kana-cell-lg" onclick="App.speak('${k.h}')">
            <span class="hira">${k.h}</span>
            <span class="kata">${k.k}</span>
            <span class="rom">${k.r}</span>
          </td>`;
        });

    html += renderTable(DAKUON_CHART, '濁音 · 半濁音');

    html += `<div class="section-title" style="margin-top:var(--spacing-xl);">拗音</div>
      <div class="kana-chart-scroll"><table class="kana-chart compact">
      <thead><tr><th></th><th>や</th><th>ゆ</th><th>よ</th></tr></thead><tbody>`;
    const yoon = [
      { label: 'き行', a: { h: 'きゃ', k: 'キャ', r: 'kya' }, i: { h: 'きゅ', k: 'キュ', r: 'kyu' }, u: { h: 'きょ', k: 'キョ', r: 'kyo' } },
      { label: 'し行', a: { h: 'しゃ', k: 'シャ', r: 'sha' }, i: { h: 'しゅ', k: 'シュ', r: 'shu' }, u: { h: 'しょ', k: 'ショ', r: 'sho' } },
      { label: 'ち行', a: { h: 'ちゃ', k: 'チャ', r: 'cha' }, i: { h: 'ちゅ', k: 'チュ', r: 'chu' }, u: { h: 'ちょ', k: 'チョ', r: 'cho' } },
      { label: 'に行', a: { h: 'にゃ', k: 'ニャ', r: 'nya' }, i: { h: 'にゅ', k: 'ニュ', r: 'nyu' }, u: { h: 'にょ', k: 'ニョ', r: 'nyo' } },
      { label: 'ひ行', a: { h: 'ひゃ', k: 'ヒャ', r: 'hya' }, i: { h: 'ひゅ', k: 'ヒュ', r: 'hyu' }, u: { h: 'ひょ', k: 'ヒョ', r: 'hyo' } },
      { label: 'み行', a: { h: 'みゃ', k: 'ミャ', r: 'mya' }, i: { h: 'みゅ', k: 'ミュ', r: 'myu' }, u: { h: 'みょ', k: 'ミョ', r: 'myo' } },
      { label: 'り行', a: { h: 'りゃ', k: 'リャ', r: 'rya' }, i: { h: 'りゅ', k: 'リュ', r: 'ryu' }, u: { h: 'りょ', k: 'リョ', r: 'ryo' } },
      { label: 'ぎ行', a: { h: 'ぎゃ', k: 'ギャ', r: 'gya' }, i: { h: 'ぎゅ', k: 'ギュ', r: 'gyu' }, u: { h: 'ぎょ', k: 'ギョ', r: 'gyo' } },
      { label: 'じ行', a: { h: 'じゃ', k: 'ジャ', r: 'ja' }, i: { h: 'じゅ', k: 'ジュ', r: 'ju' }, u: { h: 'じょ', k: 'ジョ', r: 'jo' } },
      { label: 'び行', a: { h: 'びゃ', k: 'ビャ', r: 'bya' }, i: { h: 'びゅ', k: 'ビュ', r: 'byu' }, u: { h: 'びょ', k: 'ビョ', r: 'byo' } },
      { label: 'ぴ行', a: { h: 'ぴゃ', k: 'ピャ', r: 'pya' }, i: { h: 'ぴゅ', k: 'ピュ', r: 'pyu' }, u: { h: 'ぴょ', k: 'ピョ', r: 'pyo' } },
    ];
    const yCols = ['a', 'i', 'u'];
    const yColLabels = ['や段', 'ゆ段', 'よ段'];
    yoon.forEach(r => {
      html += `<tr><td class="row-label">${r.label}</td>`;
      yCols.forEach(c => {
        const k = r[c];
        if (!k) { html += `<td class="empty"></td>`; return; }
        html += `<td class="kana-cell-lg" onclick="App.speak('${k.h}')">
          <span class="hira">${k.h}</span>

  /* ─── flashcard ─── */
  buildDeck(filter) {
    const cards = [];
    FLASH_KANA.forEach(k => {
      if (filter === 'all' || filter === 'hiragana') cards.push({ type: 'hiragana', char: k.h, rom: k.r });
      if (filter === 'all' || filter === 'katakana') cards.push({ type: 'katakana', char: k.k, rom: k.r });
    });
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    return cards;
  },

  openFlashcard(filter) {
    this.state.flashcardFilter = filter || 'all';
    this.state.flashcardDeck = this.buildDeck(this.state.flashcardFilter);
    this.state.flashcardMode = true;
    this.state.flashcardIdx = 0;
    this.state.flashcardFlipped = false;
    document.getElementById('backBtn').classList.add('visible');
    this.renderFlashcard();
  },

  switchFlashcardFilter(filter) {
    this.state.flashcardFilter = filter;
    this.state.flashcardDeck = this.buildDeck(filter);
    this.state.flashcardIdx = 0;
    this.state.flashcardFlipped = false;
    this.renderFlashcard();
  },

  renderFlashcard() {
    const container = document.getElementById('quizContent');
    const deck = this.state.flashcardDeck;
    const total = deck.length;
    const idx = this.state.flashcardIdx;
    const card = deck[idx];
    const knownKey = card.type === 'hiragana' ? 'h_' : 'k_' + card.rom;
    const isKnown = this.state.flashcardKnown.includes(knownKey);
    const isLast = idx + 1 >= total;

    const filterLabels = { all: '全部', hiragana: '平假名', katakana: '片假名' };

    let html = `<div class="flashcard-filter-bar">
      ${Object.entries(filterLabels).map(([k, v]) =>
        `<button class="fc-filter-btn${this.state.flashcardFilter === k ? ' active' : ''}" onclick="App.switchFlashcardFilter('${k}')">${v}</button>`
      ).join('')}
    </div>
    <div class="flashcard-wrap">
      <div class="flashcard-counter">${idx + 1} / ${total}</div>
      <div class="flashcard-nav">
        <button class="fc-nav-btn" onclick="App.prevCard()" ${idx === 0 ? 'disabled' : ''}>◀</button>
        <span class="fc-nav-label">${card.type === 'hiragana' ? '平假名' : '片假名'} · ${card.rom}</span>
        <button class="fc-nav-btn" onclick="App.nextCard()" ${isLast ? 'disabled' : ''}>▶</button>
      </div>
      <div class="flashcard${this.state.flashcardFlipped ? ' flipped' : ''}" onclick="App.flipFlashcard()">
        <div class="flashcard-inner">
          <div class="flashcard-face flashcard-front">
            <div class="fc-char">${card.char}</div>
            <div class="fc-label">${card.type === 'hiragana' ? '平假名' : '片假名'} · 點擊翻面</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div class="fc-char">${card.char}</div>
            <div class="fc-rom">${card.rom}</div>
            <div class="fc-label">${card.type === 'hiragana' ? '平假名' : '片假名'}</div>
          </div>
        </div>
      </div>`;

    if (this.state.flashcardFlipped) {
      html += `<div class="flashcard-hint">記得了嗎？</div>
        <div class="flashcard-actions">
          <button class="btn-unknown" onclick="App.flashcardResult(false)" title="還不熟">✗</button>
          <button class="btn-known" onclick="App.flashcardResult(true)" title="記得了">✓</button>
        </div>`;
    }

    html += `<div class="flashcard-nav-bottom">
        <button class="flashcard-next-btn" onclick="App.nextCard()" ${isLast ? 'disabled' : ''}>→ 下一張</button>
      </div>
      <div class="flashcard-key-hint">鍵盤快捷：← 上一張 · → 下一張 · 空白鍵翻面</div>
    </div>`;
    container.innerHTML = html;

    const wrap = container.querySelector('.flashcard-wrap');
    if (wrap) {
      wrap.addEventListener('touchstart', e => { App._swipeX = e.touches[0].clientX; }, { passive: true });
      wrap.addEventListener('touchmove', e => {
        if (App._swipeX == null) return;
        const dx = e.touches[0].clientX - App._swipeX;
        if (dx < 0) {
          wrap.style.transform = `translateX(${dx}px)`;
          wrap.style.opacity = 1 + (dx / 300);
        }
      }, { passive: true });
      wrap.addEventListener('touchend', e => {
        if (App._swipeX == null) return;
        const dx = (e.changedTouches[0].clientX - App._swipeX);
        wrap.style.transform = '';
        wrap.style.opacity = '';
        App._swipeX = null;
        if (dx < -60 && App.state.flashcardFlipped && !isLast) {
          App.nextCard();
        }
      }, { passive: true });
    }
  },

  flipFlashcard() {
    this.state.flashcardFlipped = !this.state.flashcardFlipped;
    const el = document.querySelector('.flashcard');
    if (el) el.classList.toggle('flipped');
    if (this.state.flashcardFlipped) {
      const card = this.state.flashcardDeck[this.state.flashcardIdx];
      if (card) this.speak(card.char);
    }
  },

  flashcardResult(known) {
    const deck = this.state.flashcardDeck;
    const idx = this.state.flashcardIdx;
    const card = deck[idx];
    const knownKey = (card.type === 'hiragana' ? 'h_' : 'k_') + card.rom;

    if (known && !this.state.flashcardKnown.includes(knownKey)) {
      this.state.flashcardKnown.push(knownKey);
    } else if (!known) {
      this.state.flashcardKnown = this.state.flashcardKnown.filter(k => k !== knownKey);
    }
    this.save();

    if (idx + 1 < deck.length) {
      this.state.flashcardIdx++;
      this.state.flashcardFlipped = false;
      this.renderFlashcard();
    } else {
      const known = this.state.flashcardKnown.length;
      const total = FLASH_KANA.length * 2;
      document.getElementById('quizContent').innerHTML = `<div class="quiz-result" style="margin-top:0;">
        <div class="score">${known}/${total}</div>
        <div class="score-label">已熟悉（全部 ${Object.keys(filterLabels).length} 種）</div>
        <div class="msg">${known === total ? '🎉 全部記住了！太棒了！' : known > total * 0.7 ? '👏 進度不錯，繼續加油！' : '💪 多練習幾次就會記住了！'}</div>
        <button class="quiz-submit" onclick="App.state.flashcardMode=false;App.switchTab('home')" style="margin-top:var(--spacing-lg);">返回首頁</button>
        <button class="quiz-submit" onclick="App.restartFlashcard()" style="margin-top:var(--spacing-sm);background:var(--accent-violet-mid);">再次練習</button>
      </div>`;
    }
  },

  nextCard() {
    const deck = this.state.flashcardDeck;
    if (this.state.flashcardIdx + 1 >= deck.length) return;
    this.state.flashcardIdx++;
    this.state.flashcardFlipped = false;
    this.renderFlashcard();
  },

  prevCard() {
    if (this.state.flashcardIdx <= 0) return;
    this.state.flashcardIdx--;
    this.state.flashcardFlipped = false;
    this.renderFlashcard();
  },

  restartFlashcard() {
    this.state.flashcardDeck = this.buildDeck(this.state.flashcardFilter);
    this.state.flashcardIdx = 0;
    this.state.flashcardFlipped = false;
    this.state.flashcardMode = true;
    this.renderFlashcard();
  },

  speak(text, rate = 0.9) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = rate;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  },

  /* ─── render lessons ─── */
  renderLessons() {
    const list = document.getElementById('lessonList');
    const detail = document.getElementById('lessonDetail');
    list.style.display = 'block';
    detail.classList.remove('active');
    detail.innerHTML = '';
    const backBtn = document.getElementById('backBtn');

    if (this.state.viewingWeek !== null) {
      backBtn.classList.add('visible');
      return;
    }
    backBtn.classList.remove('visible');

    list.innerHTML = '<h2 style="font-size:18px;font-weight:600;margin-bottom:var(--spacing-lg);">課程列表</h2>' +
      '<div class="lesson-list">' +
      COURSE.weeks.map(w => {
        const done = this.state.done.includes(w.id);
        const score = this.state.scores[w.id];
        const status = done ? '✅' : (score !== undefined ? '📝' : '🔒');
        return `<div class="lesson-card${done ? ' completed' : ''}" onclick="App.openLesson(${w.id})">
          <div class="badge">${String(w.id).padStart(2,'0')}</div>
          <div class="info">
            <h3>第 ${w.id} 週：${w.title}</h3>
            <p>${w.topics}</p>
          </div>
          <div class="status-icon">${status}</div>
        </div>`;
      }).join('') +
      '</div>';
  },

  renderLessonDetail(id) {
    const w = COURSE.weeks.find(x => x.id === id);
    if (!w) return;
    const list = document.getElementById('lessonList');
    const detail = document.getElementById('lessonDetail');
    list.style.display = 'none';
    detail.classList.add('active');

    let html = `<div style="margin-bottom:var(--spacing-lg);">
      <p style="font-size:12px;color:var(--on-dark-muted);text-transform:uppercase;letter-spacing:0.2px;">第 ${id} 週</p>
      <h2 style="font-size:22px;font-weight:600;margin-top:var(--spacing-xs);">${w.title}</h2>
    </div>`;

    if (w.intro) {
      html += `<p class="intro-text">${w.intro}</p>`;
    }

    if (w.kana && w.kana.length) {
      html += `<div class="section-title">🔊 假名表（點擊聽發音）</div>
        <div class="kana-grid">`;
      w.kana.forEach(k => {
        html += `<div class="kana-cell" onclick="App.speak('${k.char}')">
          <span class="char">${k.char}</span>
          <span class="rom">${k.rom}</span>
        </div>`;
      });
      html += `</div>`;
    }

    if (w.vocab && w.vocab.length) {
      html += `<div class="section-title">📖 單字</div><div class="vocab-list">`;
      w.vocab.forEach(v => {
        html += `<div class="vocab-item">
          <span class="jp">${v.jp}</span>
          <span class="romaji">${v.rom}</span>
          <span class="zh">${v.zh}</span>
          <button class="sound-btn" onclick="event.stopPropagation();App.speak('${v.jp}')">▶</button>
        </div>`;
      });
      html += `</div>`;
    }

    if (w.grammar && w.grammar.length) {
      html += `<div class="section-title">📚 文法</div>`;
      w.grammar.forEach((g, gi) => {
        let voiceBtns = '';
        if (g.voice) {
          const items = Array.isArray(g.voice) ? g.voice : [g.voice];
          voiceBtns = `<div class="grammar-voice">` +
            items.map((v, vi) => `<button class="voice-btn" data-w="${w.id}" data-g="${gi}" data-vi="${vi}">🔊 ${v}</button>`).join('') +
            `</div>`;
        }
        html += `<div class="grammar-item">
          <div class="pattern">${g.pattern}</div>
          <div class="explain">${g.explain}</div>
          <div class="example">${g.example}</div>
          ${voiceBtns}
        </div>`;
      });
    }

    const hasQuiz = w.quiz && w.quiz.length;
    if (hasQuiz) {
      const done = this.state.done.includes(id);
      const score = this.state.scores[id];
      html += `<div style="margin-top:var(--spacing-xl);text-align:center;">
        <button class="quiz-submit" onclick="App.startQuiz(${id})" style="display:inline-block;width:auto;padding:var(--spacing-md) var(--spacing-xxl);">
          ${done ? '📝 重新測驗' : '✍️ 開始測驗'}
        </button>
        ${score !== undefined ? `<p style="margin-top:var(--spacing-sm);color:var(--on-dark-muted);font-size:13px;">上次成績：${score} 分</p>` : ''}
      </div>`;
    }

    // Mark as done button
    if (!this.state.done.includes(id)) {
      html += `<div style="margin-top:var(--spacing-lg);text-align:center;">
        <button class="quiz-submit" onclick="App.markDone(${id})" style="display:inline-block;width:auto;padding:var(--spacing-md) var(--spacing-xxl);background:var(--accent-violet-mid);">
          ✅ 標記為已完成
        </button>
      </div>`;
    }

    detail.innerHTML = html;

    detail.querySelectorAll('.voice-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const w = COURSE.weeks.find(x => x.id === Number(btn.dataset.w));
        if (!w) return;
        const g = w.grammar[Number(btn.dataset.g)];
        if (!g) return;
        const items = Array.isArray(g.voice) ? g.voice : [g.voice];
        const text = items[Number(btn.dataset.vi)].replace(/[（）].*$/g, '').trim();
        this.speak(text);
      });
    });
  },

  markDone(id) {
    if (!this.state.done.includes(id)) {
      this.state.done.push(id);
      this.save();
      this.renderLessonDetail(id);
    }
  },

  /* ─── quiz ─── */
  startQuiz(id) {
    this.state.quizWeek = id;
    this.state.quizSubmitted = false;
    document.getElementById('backBtn').classList.add('visible');
    this.switchTab('quiz');
  },

  renderQuiz() {
    const container = document.getElementById('quizContent');
    const id = this.state.quizWeek;
    if (!id) {
      container.innerHTML = `<div class="empty-state">
        <span class="icon">📝</span>
        <p>請先從課程中選擇一課<br>點擊「開始測驗」按鈕</p>
      </div>
      <div style="text-align:center;padding:var(--spacing-lg) 0;">
        <div style="border-top:1px solid var(--hairline-violet);padding-top:var(--spacing-xl);margin:0 var(--spacing-xl);"></div>
        <p style="color:var(--on-dark-muted);font-size:13px;margin-bottom:var(--spacing-lg);">或使用閃卡練習 50 音</p>
        <button class="quiz-submit" onclick="App.openFlashcard()" style="display:inline-block;width:auto;padding:var(--spacing-md) var(--spacing-xxl);background:var(--accent-violet-deep);">
          🃏 50 音閃卡
        </button>
        <p style="color:var(--on-dark-muted);font-size:12px;margin-top:var(--spacing-sm);">已熟悉 ${this.state.flashcardKnown.length} / ${FLASH_KANA.length * 2} 個</p>
      </div>`;
      return;
    }
    const w = COURSE.weeks.find(x => x.id === id);
    if (!w || !w.quiz || !w.quiz.length) {
      container.innerHTML = `<div class="empty-state"><span class="icon">❌</span><p>此課尚無測驗</p></div>`;
      return;
    }

    const done = this.state.done.includes(id);
    const prevScore = this.state.scores[id];

    let html = `<div class="quiz-header">
      <h2>第 ${id} 週測驗：${w.title}</h2>
      <p class="quiz-meta">共 ${w.quiz.length} 題 · 點擊選項作答 · 完成後按提交</p>
      ${prevScore !== undefined ? `<p style="color:var(--accent-lime);font-size:13px;margin-top:var(--spacing-xs);">上次成績：${prevScore}/100</p>` : ''}
    </div>`;

    w.quiz.forEach((q, i) => {
      html += `<div class="quiz-question" data-q="${i}">
        <div class="q-num">問題 ${i + 1} / ${w.quiz.length}</div>
        <div class="q-text">${q.q}</div>
        <div class="quiz-options" data-q="${i}">`;
      q.opts.forEach((o, j) => {
        html += `<button class="quiz-option" data-q="${i}" data-opt="${j}" onclick="App.selectAnswer(${i}, ${j})">
          <span class="opt-label">${String.fromCharCode(65 + j)}</span> ${o}
        </button>`;
      });
      html += `</div></div>`;
    });

    html += `<button class="quiz-submit" id="quizSubmitBtn" onclick="App.submitQuiz()" disabled>提交答案</button>`;

    container.innerHTML = html;
  },

  selectAnswer(qIdx, optIdx) {
    if (this.state.quizSubmitted) return;
    const container = document.querySelector(`.quiz-options[data-q="${qIdx}"]`);
    container.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
    container.querySelector(`[data-opt="${optIdx}"]`).classList.add('selected');

    // Track selected
    if (!this._answers) this._answers = {};
    this._answers[qIdx] = optIdx;

    // Enable submit if all answered
    const w = COURSE.weeks.find(x => x.id === this.state.quizWeek);
    const total = w.quiz.length;
    const answered = Object.keys(this._answers).length;
    document.getElementById('quizSubmitBtn').disabled = answered < total;
  },

  submitQuiz() {
    if (this.state.quizSubmitted) return;
    const w = COURSE.weeks.find(x => x.id === this.state.quizWeek);
    if (!w) return;
    this.state.quizSubmitted = true;

    let correct = 0;
    w.quiz.forEach((q, i) => {
      const selected = this._answers[i];
      const opts = document.querySelectorAll(`.quiz-options[data-q="${i}"] .quiz-option`);
      opts.forEach((b, j) => {
        b.disabled = true;
        if (j === q.ans) b.classList.add('correct');
        if (j === selected && j !== q.ans) b.classList.add('wrong');
      });
      if (selected === q.ans) correct++;
    });

    const pct = Math.round((correct / w.quiz.length) * 100);
    this.state.scores[w.id] = pct;

    let msg = '';
    if (pct === 100) msg = '完美！全部答對了！🎉';
    else if (pct >= 80) msg = '非常好！繼續保持！👏';
    else if (pct >= 60) msg = '不錯，再加強一下！💪';
    else msg = '加油，多複習幾次！📖';

    const container = document.getElementById('quizContent');
    container.insertAdjacentHTML('beforeend', `<div class="quiz-result">
      <div class="score">${correct}/${w.quiz.length}</div>
      <div class="score-label">正確題數</div>
      <div class="msg">${msg}</div>
    </div>`);

    document.getElementById('quizSubmitBtn').disabled = true;
    document.getElementById('quizSubmitBtn').textContent = '已提交';

    // Auto mark done if passed
    if (pct >= 60 && !this.state.done.includes(w.id)) {
      this.state.done.push(w.id);
    }
    this.save();
  },

  /* ─── home stats ─── */
  updateHomeStats() {
    const total = COURSE.weeks.length;
    const done = this.state.done.length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('ringPct').textContent = pct + '%';
    const circle = document.getElementById('ringFg');
    const circumference = 314.16;
    circle.style.strokeDashoffset = circumference - (pct / 100) * circumference;

    document.getElementById('statLessons').textContent = done + '/' + total;
    const quizCount = Object.keys(this.state.scores).length;
    document.getElementById('statQuizzes').textContent = quizCount;

    const scores = Object.values(this.state.scores);
    const avg = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : '-';
    document.getElementById('statAvg').textContent = avg;
  },

  /* ─── progress ─── */
  renderProgress() {
    const container = document.getElementById('progressContent');
    const total = COURSE.weeks.length;
    const done = this.state.done.length;
    const scores = Object.values(this.state.scores);
    const avg = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;

    let html = `<h2 style="font-size:18px;font-weight:600;margin-bottom:var(--spacing-lg);">學習進度</h2>
      <div class="progress-grid">
        <div class="progress-card"><div class="big">${done}/${total}</div><div class="lbl">已完成課程</div></div>
        <div class="progress-card"><div class="big">${scores.length}</div><div class="lbl">測驗次數</div></div>
        <div class="progress-card"><div class="big">${avg}分</div><div class="lbl">平均分數</div></div>
        <div class="progress-card"><div class="big">${Math.round((done/total)*100)}%</div><div class="lbl">總完成率</div></div>
      </div>
      <div class="section-title" style="margin-top:0;">各課進度</div>
      <div class="progress-detail">`;

    COURSE.weeks.forEach(w => {
      const d = this.state.done.includes(w.id);
      const s = this.state.scores[w.id];
      const bar = s !== undefined ? s : (d ? 100 : 0);
      const status = d ? '✅' : (s !== undefined ? '📝' : '⭕');
      html += `<div class="progress-row">
        <span class="p-status">${status}</span>
        <span class="p-name">第${w.id}課</span>
        <div class="p-bar"><div class="fill" style="width:${bar}%"></div></div>
        <span class="p-score">${s !== undefined ? s + '分' : (d ? '✓' : '-')}</span>
      </div>`;
    });

    html += `</div>`;
    container.innerHTML = html;
  },

  /* ─── quiz tracking ─── */
  _answers: {}
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
